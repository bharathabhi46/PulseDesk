services:
  - type: web
    name: pulsedesk-api
    env: node
    rootDir: pulseDeskBackEnd
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: pulsedesk-client
    runtime: static
    rootDir: pulseDeskFrontEnd
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
